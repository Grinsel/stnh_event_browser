<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STNH Event Browser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header id="masthead">
        <div class="header-inner">
            <div class="site-title">
                <h1>ST:NH <span class="accent">Event Browser</span></h1>
            </div>
            <div class="header-search">
                <input type="text" id="search-input" placeholder="Search events... (id:, ns:, faction:)" autocomplete="off">
            </div>
            <div class="header-controls">
                <div class="font-size-control">
                    <label>A</label>
                    <input type="range" id="font-size-slider" min="90" max="160" step="5" value="118" title="Text size">
                    <label style="font-size:0.95rem">A</label>
                </div>
                <select id="lang-select" title="Language">
                    <option value="english">English</option>
                    <option value="german">Deutsch</option>
                    <option value="french">Français</option>
                    <option value="spanish">Español</option>
                    <option value="russian">Русский</option>
                    <option value="polish">Polski</option>
                    <option value="braz_por">Português</option>
                </select>
            </div>
        </div>
    </header>

    <!-- Filter Bar -->
    <div id="filter-bar">
        <div class="filter-inner">
            <div class="filter-group">
                <label>Type</label>
                <select id="filter-type">
                    <option value="">All Types</option>
                    <option value="country_event">Country</option>
                    <option value="ship_event">Ship</option>
                    <option value="planet_event">Planet</option>
                    <option value="fleet_event">Fleet</option>
                    <option value="situation_event">Situation</option>
                    <option value="observer_event">Observer</option>
                    <option value="pop_event">Pop</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Faction</label>
                <select id="filter-faction">
                    <option value="">All Factions</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Category</label>
                <select id="filter-category">
                    <option value="">All Categories</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Namespace</label>
                <select id="filter-namespace">
                    <option value="">All Namespaces</option>
                </select>
            </div>
            <div class="filter-toggles">
                <label><input type="checkbox" id="filter-hidden"> Show Hidden</label>
                <label><input type="checkbox" id="filter-triggered" checked> Triggered Only</label>
            </div>
            <div class="filter-stats" id="filter-stats">
                Loading...
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <!-- Namespace Sidebar -->
        <aside id="namespace-sidebar">
            <div class="sidebar-header">
                <h3>Namespaces</h3>
                <button id="sidebar-toggle" title="Toggle sidebar">◀</button>
            </div>
            <div id="namespace-tree"></div>
        </aside>

        <!-- Event List -->
        <main id="event-list-panel">
            <div id="event-list"></div>
            <div id="pagination"></div>
        </main>

        <!-- Event Detail -->
        <aside id="event-detail-panel" class="hidden">
            <div class="detail-header">
                <button id="detail-close" title="Close">✕</button>
                <h2 id="detail-title">Event Detail</h2>
            </div>
            <div id="event-detail"></div>
        </aside>
    </div>

    <!-- Chain Viewer Modal -->
    <div id="chain-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Event Chain</h2>
                <button id="chain-close" class="modal-close">✕</button>
            </div>
            <div id="chain-viewer"></div>
        </div>
    </div>

    <footer id="site-footer">
        <p>ST:NH Event Browser — Data from <a href="https://steamcommunity.com/sharedfiles/filedetails/?id=688086068" target="_blank">Star Trek: New Horizons</a> mod</p>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/state.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/search.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/render.js"></script>
    <script src="js/ui/event-list.js"></script>
    <script src="js/ui/event-detail.js"></script>
    <script src="js/ui/namespace-nav.js"></script>
    <script src="js/ui/chain-viewer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
